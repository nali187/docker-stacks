# =====================================
#  Basic Telegraf Config for InfluxDB 3
# =====================================


#[agent]
#	interval = "10s"
#	round_interval = true
#	collection_jitter = "2s"     # ~20% of interval is fine
#	flush_interval = "10s"
#	flush_jitter   = "1s"        # 5–20% of flush_interval; start with 1s
#	precision = "1s"
#	metric_batch_size   = 1000   # >= your expected points per flush (500)
#	metric_buffer_limit = 20000  # ~20k points buffer (~400s of backlog at 50 pts/s)
#	omit_hostname = true
#	skip_processors_after_aggregators = true


[agent]
  ## identisch zum Telegraf-Default und damit zum Verhalten der Prod-Pipeline
  interval = "10s"
  round_interval = true
  flush_interval = "10s"

## InfluxDB 3 Core ueber den v2-kompatiblen Write-Endpoint (Port 8181).
## "bucket" (Tag aus den Inputs) wird auf den Datenbanknamen gemappt.
## "organization" wird von InfluxDB 3 ignoriert, muss aber gesetzt sein.
[[outputs.influxdb_v2]]
 # urls = ["http://192.168.50.164:8181"]
 # token = "${INFLUXDB3_TOKEN}"
   urls = ["http://192.168.50.164:8181"]
   token = "***REMOVED_INFLUXDB_V3_TOKEN***"

  organization = "Neubauer"
  bucket_tag = "bucket"
  ## Routing-Tag nicht in die Daten schreiben (Datenbank kodiert ihn bereits)
  exclude_bucket_tag = true
