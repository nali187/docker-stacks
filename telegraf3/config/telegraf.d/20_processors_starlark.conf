[[processors.starlark]]
  source = '''
def scale(val, sf):
    return val * pow(10, sf)

def apply(metric):
    f = metric.fields

    # =========================
    # Fronius AC Scaling
    # =========================

  # AC Power
    if "ac_power_raw" in f and "ac_power_sf" in f:
        f["ac_power_w"] = scale(f["ac_power_raw"], f["ac_power_sf"])

    # DC Power
    if "dc_power_raw" in f and "dc_power_sf" in f:
        f["dc_power_w"] = scale(f["dc_power_raw"], f["dc_power_sf"])

    # DC Voltage
    if "dc_voltage_raw" in f and "dc_voltage_sf" in f:
        f["dc_voltage_v"] = scale(f["dc_voltage_raw"], f["dc_voltage_sf"])

    # DC Current
    if "dc_current_raw" in f and "dc_current_sf" in f:
        f["dc_current_a"] = scale(f["dc_current_raw"], f["dc_current_sf"])

    # Frequency
    if "grid_frequency_raw" in f and "grid_frequency_sf" in f:
        f["grid_frequency_hz"] = scale(f["grid_frequency_raw"], f["grid_frequency_sf"])

    # Temperature
    if "inverter_temp_raw" in f and "inverter_temp_sf" in f:
        f["inverter_temp_c"] = scale(f["inverter_temp_raw"], f["inverter_temp_sf"])

    # Power Factor
    if "power_factor_raw" in f and "power_factor_sf" in f:
        f["power_factor"] = scale(f["power_factor_raw"], f["power_factor_sf"])

    # Smart Meter Power
    if "total_power_raw" in f and "power_sf" in f:
        f["total_power_w"] = scale(f["total_power_raw"], f["power_sf"])

    if "phase_a_power_raw" in f and "power_sf" in f:
        f["phase_a_power_w"] = scale(f["phase_a_power_raw"], f["power_sf"])

    if "phase_b_power_raw" in f and "power_sf" in f:
        f["phase_b_power_w"] = scale(f["phase_b_power_raw"], f["power_sf"])

    if "phase_c_power_raw" in f and "power_sf" in f:
        f["phase_c_power_w"] = scale(f["phase_c_power_raw"], f["power_sf"])

    # Voltage
    if "phase_a_voltage_raw" in f and "voltage_sf" in f:
        f["phase_a_voltage_v"] = scale(f["phase_a_voltage_raw"], f["voltage_sf"])

    if "phase_b_voltage_raw" in f and "voltage_sf" in f:
        f["phase_b_voltage_v"] = scale(f["phase_b_voltage_raw"], f["voltage_sf"])

    if "phase_c_voltage_raw" in f and "voltage_sf" in f:
        f["phase_c_voltage_v"] = scale(f["phase_c_voltage_raw"], f["voltage_sf"])

    # Current
    if "total_current_raw" in f and "current_sf" in f:
        f["total_current_a"] = scale(f["total_current_raw"], f["current_sf"])

    # Energy
    if "energy_import_raw" in f and "energy_sf" in f:
        f["energy_import_wh"] = scale(f["energy_import_raw"], f["energy_sf"])

    if "energy_export_raw" in f and "energy_sf" in f:
        f["energy_export_wh"] = scale(f["energy_export_raw"], f["energy_sf"])

    # =========================
    # MPPT Module Scaling
    # =========================

    for i in range(1, 5):
        prefix = f"module_{i}_"

        if prefix + "dc_power_raw" in f and "dc_power_sf" in f:
            f[prefix + "dc_power_w"] = scale(f[prefix + "dc_power_raw"], f["dc_power_sf"])

        if prefix + "dc_voltage_raw" in f and "dc_voltage_sf" in f:
            f[prefix + "dc_voltage_v"] = scale(f[prefix + "dc_voltage_raw"], f["dc_voltage_sf"])

        if prefix + "dc_current_raw" in f and "dc_current_sf" in f:
            f[prefix + "dc_current_a"] = scale(f[prefix + "dc_current_raw"], f["dc_current_sf"])

        if prefix + "dc_energy_raw" in f and "dc_energy_sf" in f:
            f[prefix + "dc_energy_wh"] = scale(f[prefix + "dc_energy_raw"], f["dc_energy_sf"])

    return metric
'''
