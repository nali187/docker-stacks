#################################################### fronius_gen24 ####################################################

[[inputs.modbus]]
  name = "fronius_gen24"
  timeout = "1s"
  busy_retries = 2
  busy_retries_wait = "100ms"
  controller = "tcp://192.168.50.252:502"
  configuration_type = "request"
  tagexclude = ["slave_id", "type", "name", "host"]

[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "ABCD"
  register = "holding"
  fields = [
    # AC
    { address = 40083, name = "ac_power_raw", type = "INT16" },
    { address = 40084, name = "ac_power_sf", type = "INT16" },

    { address = 40085, name = "grid_frequency_raw", type = "UINT16" },
    { address = 40086, name = "grid_frequency_sf", type = "INT16" },

    { address = 40091, name = "power_factor_raw", type = "INT16" },
    { address = 40092, name = "power_factor_sf", type = "INT16" },

    { address = 40093, name = "ac_energy_wh", type = "UINT32" },
    { address = 40095, name = "ac_energy_sf", type = "INT16" },

    # DC
    { address = 40096, name = "dc_current_raw", type = "UINT16" },
    { address = 40255, name = "dc_current_sf", type = "INT16" },

    { address = 40098, name = "dc_voltage_raw", type = "UINT16" },
    { address = 40256, name = "dc_voltage_sf", type = "INT16" },

    { address = 40100, name = "dc_power_raw", type = "INT16" },
    { address = 40257, name = "dc_power_sf", type = "INT16" },

    # Temperatur
    { address = 40102, name = "inverter_temp_raw", type = "INT16" },
    { address = 40106, name = "inverter_temp_sf", type = "INT16" },

    # Status
    { address = 40107, name = "inverter_state", type = "UINT16" },
  ]

[inputs.modbus.request.tags]
  origin = "fronius_gen24"


            #################################################### fronius_mppt ####################################################

[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "ABCD"
  register = "holding"
  fields = [
    # Scale Factors (GLOBAL für alle Module!)
    { address = 40255, name = "dc_current_sf", type = "INT16" },
    { address = 40256, name = "dc_voltage_sf", type = "INT16" },
    { address = 40257, name = "dc_power_sf", type = "INT16" },
    { address = 40258, name = "dc_energy_sf", type = "INT16" },

    # Module 1
    { address = 40272, name = "module_1_dc_current_raw", type = "UINT16" },
    { address = 40273, name = "module_1_dc_voltage_raw", type = "UINT16" },
    { address = 40274, name = "module_1_dc_power_raw", type = "UINT16" },
    { address = 40275, name = "module_1_dc_energy_raw", type = "UINT32" },

    # Module 2
    { address = 40292, name = "module_2_dc_current_raw", type = "UINT16" },
    { address = 40293, name = "module_2_dc_voltage_raw", type = "UINT16" },
    { address = 40294, name = "module_2_dc_power_raw", type = "UINT16" },
    { address = 40295, name = "module_2_dc_energy_raw", type = "UINT32" },

    # Module 3
    { address = 40312, name = "module_3_dc_current_raw", type = "UINT16" },
    { address = 40313, name = "module_3_dc_voltage_raw", type = "UINT16" },
    { address = 40314, name = "module_3_dc_power_raw", type = "UINT16" },
    { address = 40315, name = "module_3_dc_energy_raw", type = "UINT32" },

    # Module 4
    { address = 40332, name = "module_4_dc_current_raw", type = "UINT16" },
    { address = 40333, name = "module_4_dc_voltage_raw", type = "UINT16" },
    { address = 40334, name = "module_4_dc_power_raw", type = "UINT16" },
    { address = 40335, name = "module_4_dc_energy_raw", type = "UINT32" },
  ]

[inputs.modbus.request.tags]
  origin = "fronius_gen24_mppt"


            #################################################### fronius_meter ####################################################

[[inputs.modbus.request]]
  slave_id = 200
  byte_order = "ABCD"
  register = "holding"
  fields = [
    # Power
    { address = 40087, name = "total_power_raw", type = "INT16" },
    { address = 40091, name = "power_sf", type = "INT16" },

    { address = 40088, name = "phase_a_power_raw", type = "INT16" },
    { address = 40089, name = "phase_b_power_raw", type = "INT16" },
    { address = 40090, name = "phase_c_power_raw", type = "INT16" },

    # Voltage
    { address = 40077, name = "phase_a_voltage_raw", type = "INT16" },
    { address = 40078, name = "phase_b_voltage_raw", type = "INT16" },
    { address = 40079, name = "phase_c_voltage_raw", type = "INT16" },
    { address = 40084, name = "voltage_sf", type = "INT16" },

    # Current
    { address = 40071, name = "total_current_raw", type = "INT16" },
    { address = 40075, name = "current_sf", type = "INT16" },

    # Energy
    { address = 40107, name = "energy_export_raw", type = "UINT32" },
    { address = 40115, name = "energy_import_raw", type = "UINT32" },
    { address = 40123, name = "energy_sf", type = "INT16" },
  ]

[inputs.modbus.request.tags]
  origin = "fronius_meter"
