# =====================================================================
# Generische SunSpec-Scale-Factor-Skalierung (dynamisch, zur Laufzeit)
#
# Konvention (siehe Fronius-Input-Dateien):
#   SF-Feld   = "<basis>_sf"        (z.B. dc_leistung_sf)
#   Wertfeld  = "<basis>"           (z.B. netzfrequenz)
#            oder "<qualifikator>_<basis>" (z.B. string_1_dc_leistung,
#                                                l1_wirkleistung)
# Der Prozessor skaliert jedes passende Wertfeld mit 10^SF und entfernt
# die SF-Felder anschliessend aus dem Metric.
#
# Fehlt ein SF-Feld (z.B. Teil-Read bei Verbindungsproblem), werden die
# zugehoerigen Wertfelder UNskaliert durchgereicht - sichtbar als
# Groessenordnungs-Ausreisser in Grafana, aber kein Datenverlust.
# Achtung: Starlark kennt kein try/except - ein Skriptfehler verwirft
# das gesamte Metric und erscheint nur im Telegraf-Log.
# =====================================================================

[[processors.starlark]]
  ## Nur auf die Fronius-Measurements anwenden (IntSF-Modell);
  ## Shelly (Float) und Waermepumpe (statische Scales) bleiben unberuehrt.
  namepass = ["gen24_wechselrichter", "gen24_smartmeter", "symo_wechselrichter"]
  source = '''
def apply(metric):
    fields = metric.fields

    sf_names = [k for k in fields.keys() if k.endswith("_sf")]

    for sf_name in sf_names:
        base = sf_name[:-3]
        factor = 10.0 ** int(fields[sf_name])
        for key in [k for k in fields.keys()]:
            if key in sf_names:
                continue
            if key == base or key.endswith("_" + base):
                fields[key] = float(fields[key]) * factor

    for sf_name in sf_names:
        fields.pop(sf_name)

    return metric
'''
