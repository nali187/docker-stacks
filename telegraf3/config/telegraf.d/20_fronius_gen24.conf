# =====================================================================
# Fronius Gen24 (Hybrid-Wechselrichter mit Batterie) + Smart Meter TS 65A-3
# Modbus TCP, IntSF-Registermodell (int + Scale Factor)
# Skalierung erfolgt dynamisch im Starlark-Prozessor (90_processor_scale_sf.conf)
#
# Namenskonvention fuer die SF-Paarung (siehe Prozessor):
#   Wertfeld  = "<basis>" oder "<qualifikator>_<basis>"
#   SF-Feld   = "<basis>_sf"
# Register-Adressen unveraendert aus der bewaehrten Influx2-Config uebernommen
# (0-basierte Adressierung, Registermap-Adresse minus 1).
# =====================================================================

[[inputs.modbus]]
  name = "fronius_gen24"
  timeout = "1s"
  busy_retries = 2
  busy_retries_wait = "100ms"
  controller = "tcp://192.168.50.252:502"
  configuration_type = "request"
  tagexclude = ["slave_id", "type", "name", "host"]

# ---------------------------------------------------------------------
# Wechselrichter: AC-Werte, DC-Strings (MPPT 1+2), Batterie (Module 3+4),
# Speicher-Ladezustand. Ein Request = ein Metric -> SF-Paarung funktioniert.
# ---------------------------------------------------------------------
[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "ABCD"
  register = "holding"
  measurement = "gen24_wechselrichter"
  fields = [
    # --- Inverter-Modell (10x): AC-Seite ---
    { address = 40083, name = "ac_leistung",             type = "INT16"  },  # W  (AC Power)
    { address = 40084, name = "ac_leistung_sf",          type = "INT16"  },  # W_SF
    { address = 40085, name = "netzfrequenz",            type = "UINT16" },  # Hz
    { address = 40086, name = "netzfrequenz_sf",         type = "INT16"  },  # Hz_SF
    { address = 40093, name = "ac_energie",              type = "UINT32" },  # WH (AC Energy, Lifetime)
    { address = 40095, name = "ac_energie_sf",           type = "INT16"  },  # WH_SF
    { address = 40102, name = "temperatur_gehaeuse",     type = "INT16"  },  # TmpCab
    { address = 40106, name = "temperatur_gehaeuse_sf",  type = "INT16"  },  # Tmp_SF
    { address = 40107, name = "betriebsstatus",          type = "UINT16" },  # St (Enum, SunSpec Operating State)
    { address = 40109, name = "ereignis_bitmaske",       type = "UINT32" },  # Evt1

    # --- MPPT-Modell (160): Scale Factors ---
    { address = 40256, name = "dc_spannung_sf",          type = "INT16"  },  # DCV_SF
    { address = 40257, name = "dc_leistung_sf",          type = "INT16"  },  # DCW_SF
    { address = 40258, name = "dc_energie_sf",           type = "INT16"  },  # DCWH_SF

    # --- MPPT Modul 1: PV-String 1 ---
    { address = 40273, name = "string_1_dc_spannung",    type = "UINT16" },  # module/1/DCV
    { address = 40274, name = "string_1_dc_leistung",    type = "UINT16" },  # module/1/DCW
    { address = 40275, name = "string_1_dc_energie",     type = "UINT32" },  # module/1/DCWH

    # --- MPPT Modul 2: PV-String 2 ---
    { address = 40293, name = "string_2_dc_spannung",    type = "UINT16" },  # module/2/DCV
    { address = 40294, name = "string_2_dc_leistung",    type = "UINT16" },  # module/2/DCW
    { address = 40295, name = "string_2_dc_energie",     type = "UINT32" },  # module/2/DCWH

    # --- MPPT Modul 3: Batterie LADEN ('StCha 3') ---
    # DCW = 0, wenn Batterie gerade entlaedt
    { address = 40313, name = "batterie_laden_dc_spannung", type = "UINT16" },  # module/3/DCV
    { address = 40314, name = "batterie_laden_dc_leistung", type = "UINT16" },  # module/3/DCW
    { address = 40315, name = "batterie_laden_dc_energie",  type = "UINT32" },  # module/3/DCWH

    # --- MPPT Modul 4: Batterie ENTLADEN ('StDisCha 4') ---
    # DCW = 0, wenn Batterie gerade laedt
    { address = 40333, name = "batterie_entladen_dc_spannung", type = "UINT16" },  # module/4/DCV
    { address = 40334, name = "batterie_entladen_dc_leistung", type = "UINT16" },  # module/4/DCW
    { address = 40335, name = "batterie_entladen_dc_energie",  type = "UINT32" },  # module/4/DCWH

    # --- Storage-Modell (124): Ladezustand + Status ---
    { address = 40351, name = "batterie_ladezustand",    type = "UINT16" },  # ChaState (% der Kapazitaet)
    { address = 40365, name = "batterie_ladezustand_sf", type = "INT16"  },  # ChaState_SF
    { address = 40354, name = "batterie_status",         type = "UINT16" },  # ChaSt: 1 OFF, 2 EMPTY, 3 DISCHARGING, 4 CHARGING, 5 FULL, 6 HOLDING, 7 TESTING
  ]

  [inputs.modbus.request.tags]
    bucket = "Fronius"

# ---------------------------------------------------------------------
# Smart Meter TS 65A-3 (am Gen24, Modbus-Geraete-ID 200)
# Vorzeichenkonvention von wirkleistung im Test verifizieren
# (Netzbezug vs. Einspeisung)
# ---------------------------------------------------------------------
[[inputs.modbus.request]]
  slave_id = 200
  byte_order = "ABCD"
  register = "holding"
  measurement = "gen24_smartmeter"
  fields = [
    { address = 40085, name = "netzfrequenz",         type = "INT16"  },  # Hz
    { address = 40086, name = "netzfrequenz_sf",      type = "INT16"  },  # Hz_SF
    { address = 40087, name = "wirkleistung",         type = "INT16"  },  # W  (Total Real Power)
    { address = 40088, name = "l1_wirkleistung",      type = "INT16"  },  # WphA
    { address = 40089, name = "l2_wirkleistung",      type = "INT16"  },  # WphB
    { address = 40090, name = "l3_wirkleistung",      type = "INT16"  },  # WphC
    { address = 40091, name = "wirkleistung_sf",      type = "INT16"  },  # W_SF (gilt fuer W + WphA/B/C)
    { address = 40107, name = "export_gesamtenergie", type = "UINT32" },  # TotWhExp (Einspeisung, Lifetime)
    { address = 40115, name = "import_gesamtenergie", type = "UINT32" },  # TotWhImp (Netzbezug, Lifetime)
    { address = 40123, name = "gesamtenergie_sf",     type = "INT16"  },  # TotWh_SF (gilt fuer Exp + Imp)
  ]

  [inputs.modbus.request.tags]
    bucket = "Fronius"
