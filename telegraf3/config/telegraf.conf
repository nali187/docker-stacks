# =====================================
#  Basic Telegraf Config for InfluxDB 3
# =====================================


[agent]
	interval = "10s"
	round_interval = true
	collection_jitter = "2s"     # ~20% of interval is fine
	flush_interval = "10s"
	flush_jitter   = "1s"        # 5–20% of flush_interval; start with 1s
	precision = "1s"
	metric_batch_size   = 1000   # >= your expected points per flush (500)
	metric_buffer_limit = 20000  # ~20k points buffer (~400s of backlog at 50 pts/s)
	omit_hostname = true
	skip_processors_after_aggregators = true


# =========================================================================
# INPUT PLUGINS (collect basic system metrics)
# =========================================================================


[[inputs.internal]]

#################################################### SMO S40 ####################################################
[[inputs.modbus]]
	name = "SMO S40"
	timeout = "1s"
	busy_retries = 2
	busy_retries_wait = "100ms"
	controller = "tcp://192.168.50.55:502"
	configuration_type= "request"
	tagexclude = ["slave_id", "type", "name", "host"]


[[inputs.modbus.request]]
	slave_id=1
	byte_order = "CDAB"
	register = "input"
	fields = [
		{ address = 1,		name = "Aktuelle Außentemperatur (BT1)",   							type = "INT16",   	scale = 0.1		},
		{ address = 1028, 	name = "Prio", 														type = "INT16", 	scale = 1.0		},
]

[inputs.modbus.request.tags]
	origin = "smos40"	# IMPORTv2: change to lowercase!
	bucket = "knv"		# IMPORTv2: change to lowercase!


# =========================================================================
# OUTPUT PLUGIN (send data to InfluxDB 3)
# =========================================================================



# 1) Duplicate every metric into two labeled copies
[[processors.clone]]
	[processors.clone.tags]
		stream = "agg_1m"

[[processors.defaults]]
	[processors.defaults.tags]
		stream = "raw"


# 3) Aggregate ONLY the agg_1m stream
[[aggregators.basicstats]]
	period = "1m"
	drop_original = true
	stats  = ["mean","min","max","sum","count"]
		[aggregators.basicstats.tagpass]
    		stream = ["agg_1m"]


# 4) Route to different databases
[[outputs.influxdb_v2]]
	urls = ["http://192.168.50.164:8181"]
	token = "***REMOVED_INFLUXDB_V3_TOKEN***"
	organization = "-"
  	bucket = "home_raw"
		[outputs.influxdb_v2.tagpass]
			stream = ["raw"]

[[outputs.influxdb_v2]]
	urls = ["http://192.168.50.164:8181"]
	token = "***REMOVED_INFLUXDB_V3_TOKEN***"
	organization = "-"
  	bucket = "home"
		[outputs.influxdb_v2.tagpass]
			stream = ["agg_1m"]

[[outputs.file]]
  files = ["/tmp/debug_out_raw.lp"]
  influx_sort_fields = true
  [outputs.file.tagpass]
    stream = ["raw"]
