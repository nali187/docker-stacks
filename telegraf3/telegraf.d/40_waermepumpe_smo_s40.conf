# ---------------------------------------------------------------------
# SMO S40: Systemtemperaturen / Betrieb (Input-Register)
# ---------------------------------------------------------------------
[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "CDAB"
  register = "input"
  measurement = "smo_s40"
  fields = [
    { address = 1,    name = "aktuelle_aussentemperatur",        type = "INT16", scale = 0.1  },  # BT1
    # { address = 9,    name = "brauchwasserbereitung",            type = "INT16", scale = 0.1  },  # BT6
    # { address = 37,   name = "mittlere_temperatur",              type = "INT16", scale = 0.1  },  # BT1
    # { address = 39,   name = "externer_vorlauf",                 type = "INT16", scale = 0.1  },  # BT25
    # { address = 40,   name = "volumenstrommesser",               type = "INT16", scale = 0.1  },  # BF1
    # { address = 72,   name = "zusatzheizung",                    type = "INT16", scale = 0.1  },  # BT63
    # { address = 398,  name = "energiezaehler_impuls",            type = "INT32", scale = 0.01 },  # BE6
    # { address = 1017, name = "berechneter_vorlauf_klimasystem_1", type = "INT16", scale = 0.1 },
    # { address = 1025, name = "gesamtbetriebszeit_zusatzheizung", type = "INT32", scale = 0.1  },
    # { address = 1028, name = "prio",                             type = "INT16", scale = 1.0  },
    # { address = 1475, name = "ruecklauf",                        type = "INT16", scale = 0.1  },  # EB101-BT3
    # { address = 1478, name = "vorlauf",                          type = "INT16", scale = 0.1  },  # EB101-BT12
  ]

  [inputs.modbus.request.tags]
    bucket = "KNV"

# ---------------------------------------------------------------------
# SMO S40: Einstellwerte (Holding-Register)
# ---------------------------------------------------------------------
[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "CDAB"
  register = "holding"
  measurement = "smo_s40"
  fields = [
    { address = 11,   name = "gradminuten",                          type = "INT16", scale = 0.1  },
    # { address = 5297, name = "sperrbereich_2_unten",                 type = "INT16", scale = 1.0  },
    # { address = 5298, name = "sperrbereich_1_unten",                 type = "INT16", scale = 1.0  },
