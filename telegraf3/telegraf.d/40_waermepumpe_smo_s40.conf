# ---------------------------------------------------------------------
# Klimatisierungssysteme 2 + 3 (Fussbodenheizungs-Kreise)
# Ein Measurement, unterschieden per Tag "klimasystem" - in SQL sauber
# per GROUP BY / WHERE filterbar statt duplizierter Feldnamen.
# ---------------------------------------------------------------------
[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "CDAB"
  register = "input"
  measurement = "klimatisierungssystem"
  fields = [
    { address = 4,    name = "vorlauf",                   type = "INT16",  scale = 0.1 },  # EP21-BT2
    { address = 77,   name = "ruecklauf",                 type = "INT16",  scale = 0.1 },  # EP21-BT3
    # { address = 1032, name = "betriebsmodus_mischventil", type = "UINT16", scale = 1.0 },
