# =====================================================================
# NIBE/KNV SMO S40 (Waermepumpen-Regler) + Aussenlufteinheit EB101
# Modbus TCP - Encoding-Fehler der alten Config bereinigt (Umlaute waren
# als Latin-1-Bytes kaputt), Namen snake_case/ASCII, Fuehler-Referenzen
# (BTxx/BPxx/EPxx/GPxx) als Kommentar erhalten.
# Modbus-Scale (0.1/0.01) bleibt wie bisher statisch im Plugin - die
# NIBE-Faktoren sind fix dokumentiert, kein SunSpec-Auto-Scaling.
# =====================================================================

[[inputs.modbus]]
  name = "smo_s40"
  timeout = "1s"
  busy_retries = 2
  busy_retries_wait = "100ms"
  controller = "tcp://192.168.50.55:502"
  configuration_type = "request"
  workarounds = { close_connection_after_gather = true }
  tagexclude = ["slave_id", "type", "name", "host"]

