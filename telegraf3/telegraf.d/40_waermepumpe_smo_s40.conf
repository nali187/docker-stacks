# ---------------------------------------------------------------------
# SMO S40: Systemtemperaturen / Betrieb (Input-Register)
# ---------------------------------------------------------------------
[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "CDAB"
  register = "input"
  measurement = "smo_s40"
  fields = [
    { address = 1,    name = "aktuelle_aussentemperatur_bt1",   type = "INT16", scale = 0.1  },  # BT1
    { address = 9,    name = "brauchwasserbereitung_bt6",       type = "INT16", scale = 0.1  },  # BT6
    { address = 37,   name = "mittlere_temperatur_bt1",         type = "INT16", scale = 0.1  },  # BT1
    { address = 39,   name = "externer_vorlauf_bt25",           type = "INT16", scale = 0.1  },  # BT25
    { address = 40,   name = "volumenstrommesser_bf1",          type = "INT16", scale = 0.1  },  # BF1
    { address = 72,   name = "zusatzheizung_bt63",              type = "INT16", scale = 0.1  },  # BT63
    { address = 398,  name = "energiezaehler_impuls_be6",       type = "INT32", scale = 0.01 },  # BE6
    { address = 1017, name = "berechneter_vorlauf_klimasystem_1", type = "INT16", scale = 0.1 },
    { address = 1025, name = "gesamtbetriebszeit_zusatzheizung", type = "INT32", scale = 0.1  },
    { address = 1028, name = "prio",                             type = "INT16", scale = 1.0  },
    { address = 1475, name = "ruecklauf_bt3",                    type = "INT16", scale = 0.1  },  # EB101-BT3
    { address = 1478, name = "vorlauf_bt12",                     type = "INT16", scale = 0.1  },  # EB101-BT12
  ]

  [inputs.modbus.request.tags]
    bucket = "KNV"

# ---------------------------------------------------------------------
# SMO S40: Einstellwerte (Holding-Register)
# ---------------------------------------------------------------------
[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "CDAB"
  register = "holding"
  measurement = "smo_s40"
  fields = [
    { address = 11,   name = "gradminuten",                          type = "INT16", scale = 0.1  },
    { address = 5297, name = "sperrbereich_2_unten",                 type = "INT16", scale = 1.0  },
    { address = 5298, name = "sperrbereich_1_unten",                 type = "INT16", scale = 1.0  },
    { address = 5299, name = "sperrbereich_2_oben",                  type = "INT16", scale = 1.0  },
    { address = 5300, name = "sperrbereich_1_oben",                  type = "INT16", scale = 1.0  },
    { address = 3028, name = "elektropatronenleistung_reservebetrieb", type = "INT16", scale = 0.01 },
  ]

  [inputs.modbus.request.tags]
    bucket = "KNV"

# ---------------------------------------------------------------------
# Klimatisierungssysteme 2 + 3 (Fussbodenheizungs-Kreise)
# Getrennte Measurements statt Tag-Unterscheidung.
# ---------------------------------------------------------------------
[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "CDAB"
  register = "input"
  measurement = "klimatisierungssystem_2"
  fields = [
    { address = 4,    name = "vorlauf",                   type = "INT16",  scale = 0.1 },  # EP21-BT2
    { address = 77,   name = "ruecklauf",                 type = "INT16",  scale = 0.1 },  # EP21-BT3
    { address = 1032, name = "betriebsmodus_mischventil", type = "UINT16", scale = 1.0 },
    { address = 1825, name = "status",                    type = "UINT16", scale = 1.0 },
    { address = 2401, name = "regelsignal_mischer",       type = "INT16",  scale = 1.0 },  # id:7122
    { address = 1056, name = "externe_justierung",        type = "INT16",  scale = 1.0 },
    { address = 1016, name = "berechneter_vorlauf",       type = "INT16",  scale = 0.1 },
  ]

  [inputs.modbus.request.tags]
    bucket = "KNV"

[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "CDAB"
  register = "input"
  measurement = "klimatisierungssystem_3"
  fields = [
    { address = 3,    name = "vorlauf",                   type = "INT16",  scale = 0.1 },  # EP22-BT2
    { address = 76,   name = "ruecklauf",                 type = "INT16",  scale = 0.1 },  # EP22-BT3
    { address = 1031, name = "betriebsmodus_mischventil", type = "UINT16", scale = 1.0 },
    { address = 1824, name = "status",                    type = "UINT16", scale = 1.0 },
    { address = 2402, name = "regelsignal_mischer",       type = "INT16",  scale = 1.0 },  # id:7123
    { address = 1055, name = "externe_justierung",        type = "INT16",  scale = 1.0 },
    { address = 1015, name = "berechneter_vorlauf",       type = "INT16",  scale = 0.1 },
  ]

  [inputs.modbus.request.tags]
    bucket = "KNV"
