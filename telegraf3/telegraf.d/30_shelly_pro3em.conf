# =====================================================================
# Shelly Pro3EM (3-Phasen-Energiemessung)
# Modbus TCP, native FLOAT32-Register - keine Skalierung noetig
# =====================================================================

[[inputs.modbus]]
  name = "shelly_pro3em"
  timeout = "1s"
  busy_retries = 2
  busy_retries_wait = "100ms"
  controller = "tcp://192.168.50.20:502"
  configuration_type = "request"
  workarounds = { close_connection_after_gather = true }
  tagexclude = ["slave_id", "type", "name", "host"]

[[inputs.modbus.request]]
  slave_id = 1
  byte_order = "CDAB"
  register = "input"
  measurement = "shelly_pro3em"
  fields = [
    { address = 1011, name = "gesamt_strom",           type = "FLOAT32" },  # A
    { address = 1013, name = "gesamt_wirkleistung",    type = "FLOAT32" },  # W
    { address = 1015, name = "gesamt_scheinleistung",  type = "FLOAT32" },  # VA

    { address = 1020, name = "l1_spannung",            type = "FLOAT32" },  # V
    { address = 1022, name = "l1_strom",               type = "FLOAT32" },  # A
    { address = 1024, name = "l1_wirkleistung",        type = "FLOAT32" },  # W
    { address = 1026, name = "l1_scheinleistung",      type = "FLOAT32" },  # VA
    { address = 1028, name = "l1_leistungsfaktor",     type = "FLOAT32" },

    { address = 1040, name = "l2_spannung",            type = "FLOAT32" },
    { address = 1042, name = "l2_strom",               type = "FLOAT32" },
    { address = 1044, name = "l2_wirkleistung",        type = "FLOAT32" },
    { address = 1046, name = "l2_scheinleistung",      type = "FLOAT32" },
    { address = 1048, name = "l2_leistungsfaktor",     type = "FLOAT32" },

    { address = 1060, name = "l3_spannung",            type = "FLOAT32" },
    { address = 1062, name = "l3_strom",               type = "FLOAT32" },
    { address = 1064, name = "l3_wirkleistung",        type = "FLOAT32" },
    { address = 1066, name = "l3_scheinleistung",      type = "FLOAT32" },
    { address = 1068, name = "l3_leistungsfaktor",     type = "FLOAT32" },
  ]

  [inputs.modbus.request.tags]
    bucket = "Shelly"
