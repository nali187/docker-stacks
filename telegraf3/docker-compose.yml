services:
  git-sync:
    image: alpine/git
    container_name: telegraf3-git-sync
    volumes:
      - telegraf-config:/config
      - /srv/docker/telegraf3/ssh:/root/.ssh:ro
    entrypoint: >
      sh -c "
      while true; do
        if [ ! -d /config/.git ]; then
          echo 'Cloning repo...';
          rm -rf /config/*;
          git clone git@github.com:nali187/docker-stacks.git /config || sleep 5;
        else
          echo 'Pulling updates...';
          cd /config && git pull || rm -rf /config/.git;
        fi;
        sleep 60;
      done
      "

  telegraf:
    image: telegraf:1.38.1
    container_name: telegraf3
    depends_on:
      - git-sync
    command: >
      sh -c "
      while [ ! -f /config/telegraf3/config/telegraf.conf ]; do sleep 2; done;
      telegraf --config /config/telegraf3/config/telegraf.conf
      "
    volumes:
      - telegraf-config:/config
    restart: unless-stopped
    networks:
      - homelab

volumes:
  telegraf-config:

networks:
  homelab:
    external: true
