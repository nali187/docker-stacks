services:
  telegraf:
    image: telegraf:1.38.1
    container_name: telegraf3
 #   command: sleep infinity
    volumes:
      - .telegraf3/config:/etc/telegraf
    restart: unless-stopped
    command: telegraf --config-directory /etc/telegraf
    networks:
      - homelab

networks:
  homelab:
    external: true
