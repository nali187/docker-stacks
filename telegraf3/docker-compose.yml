services:
  telegraf:
    image: telegraf:1.38.1
    container_name: telegraf3
    user: "1000:1000"
    depends_on:
      - git-sync
    command: >
      telegraf
      --config /config/telegraf3/config/telegraf.conf
      --config-directory /config/telegraf3/config/telegraf.d
    volumes:
      - telegraf-config:/config
    restart: unless-stopped
    networks:
      - homelab

  git-sync:
    image: alpine/git
    container_name: telegraf3-git-sync
    user: "1000:1000"
    volumes:
      - telegraf-config:/config
      - /srv/docker/telegraf3/ssh:/root/.ssh:ro
    entrypoint: >
      sh -c "
      while true; do
        if [ ! -d /config/.git ]; then
          echo 'Cloning repo...';
          rm -rf /config/*;
          git clone git@github.com:nali187/docker-stacks.git /config || sleep 5;
        else
          echo 'Pulling updates...';
          cd /config && git pull || rm -rf /config/.git;
        fi;
        sleep 60;
      done
      "

volumes:
  telegraf-config:

networks:
  homelab:
    external: true
