services:
  telegraf:
    image: telegraf:1.39.1
    container_name: telegraf3
    command: >
      telegraf
      --debug
      --config /etc/telegraf/telegraf.conf
      --config-directory /etc/telegraf/telegraf.d
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./telegraf.d:/etc/telegraf/telegraf.d:ro
    environment:
      INFLUXDB3_TOKEN: "${INFLUXDB3_TOKEN}"
      CMI_USERNAME: "${CMI_USERNAME}"
      CMI_PASSWORD: "${CMI_PASSWORD}"
    restart: unless-stopped
    networks:
      - homelab
networks:
  homelab:
    external: true
