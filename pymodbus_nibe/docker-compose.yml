version: "3.9"
services:
  nibe-regler:
    image: python:3.11-slim
    container_name: nibe-frequenz-regler
    working_dir: /app
    restart: unless-stopped
    environment:
      # ---------------- CORE / REG ----------------
      - CORE_HOST=192.168.50.55                 # Nibe/CMI IP
      - CORE_PORT=502                           # Modbus TCP Port
      - CORE_MODBUS_UNIT_ID=1                   # Modbus Slave ID
      - CORE_LOOP_INTERVAL_SEC=30               # Regeltakt (s)

      - REG_OUTDOOR=1                           # Außentemperatur
      - REG_FLOW_IST=1478                       # Vorlauf-Ist
      - REG_FLOW_SOLL=1017                      # Vorlauf-Soll
      - REG_BUFFER_IST=39                       # Puffer-Ist (alt: REG_BUF_IST)
      - REG_DEFROST_FLAG=1805                   # Defrost-Flag (1/0)
      - REG_FREQ_CAP=5298                       # Schreib-Register für Hz-Cap
      - REG_STATUS=1028                         # Betriebsstatus (10=OFF,20=DHW,30=HEAT)
      - REG_COMPRESSOR_HZ=1803                  # Kompressor-Frequenz Ist

      - CORE_MIN_CAP_HZ=25                      # untere Hz-Grenze
      - CORE_MAX_CAP_HZ=85                      # obere Hz-Grenze
      - CORE_EMA_TAU_FLOW_SEC=90                # EMA-Zeitkonstante Vorlauf
      - CORE_DEADBAND_DELTA_K=0.5               # Totband ±K
      - CORE_STEP_UP_HZ=1                       # max +Hz je Takt
      - CORE_STEP_DOWN_HZ=2                     # max -Hz je Takt
      - CORE_STEP_UP_DHW_HZ=10                  # schneller rauf im DHW
      - CORE_STEP_DOWN_AFTER_DHW_HZ=10          # schneller runter im DHW
      - CORE_POST_DHW_WINDOW_SEC=180            # Zeitspanne für schneller runter in DHW
      - CORE_STARTUP_RAMP_SEC=120               # globaler sanfter Hochlauf
      - CORE_SETPOINT_OFFSET_C=0.0              # Feinversatz Soll

      # Logging
      - LOG_LEVEL=INFO
      - LOG_ENABLE_JSON=1
      - LOG_DIR=/app/log
      - LOG_BASENAME=wpregler

      # Outdoor-Kappe
      - OUTDOORCAP_ENABLE=1                     # Klimakappe aktiv
      - OUTDOORCAP_USE_DHW=1                    # eigene DHW-Kappe

      # ---------------- DEFROST ----------------
      - DEFROST_ENABLE=1                        # Block aktivieren/deaktivieren
      - DEFROST_COOLDOWN_SEC=600                # Cooldown nach Defrost
      - DEFROST_COOLDOWN_STEP_UP_HZ=1           # Schrittweite während Cooldown
      - DEFROST_HOLD_MAX_SEC=600                # max HOLD-Dauer
      - DEFROST_HOLD_CAP_HZ=25                  # Cap während HOLD
      - DEFROST_HOLD_RELEASE_DELTA_K=1.2        # Release-Bedingung (EMA ≥ Soll−ΔK)
      - DEFROST_HOLD_BYPASS_WHEN_DHW=true       # HOLD im DHW lockern

      # ---------------- SOLARLOCK ----------------
      - SOLARLOCK_ENABLE=true                   # Block aktivieren/deaktivieren
      - SOLARLOCK_ENGAGE_DELTA_K=5.0            # Engage wenn Buffer > Soll+ΔK
      - SOLARLOCK_MIN_HOLD_SEC=900              # Mindestdauer
      - SOLARLOCK_RELEASE_DELTA_K=2.0           # Release bei Soll+ΔK’
      - SOLARLOCK_ACTIVE_IN_DHW=false           # in DHW wirksam?

      # ---------------- SMO40 / OFF ----------------
      - SMO40_ENABLE=true                       # Block aktivieren/deaktivieren
      - SMO40_SUSPEND_WRITES_WHEN_OFF=true      # im OFF keine Writes

      - SMO40_STARTUP_AFTER_OFF_SEC=180         # sanfter Start nach OFF
      - SMO40_KI_ZERO_AFTER_OFF_SEC=180         # I-Anteil für X s = 0
      - SMO40_KP_SCALE_DURING_STARTUP=0.7       # P-Anteil reduziert im Startfenster

    volumes:
      - /home/nali/docker/nibe-frequenz-regler:/app
      - /home/nali/docker/nibe-frequenz-regler/log:/app/log

    command: /app/start.sh