version: "3.8"

services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    environment:
      - PUID=1000           # UID of user 'nali' (check with: id nali)
      - PGID=1000           # GID of user 'nali'
      - TZ=Europe/Vienna
    ports:
      - "8200:8200"         # Web UI
    volumes:
      # Duplicati's own config & job database
      - /opt/duplicati/config:/config

      # ALL your Docker data, now centralized
      - /srv/docker:/source/docker_all

      # Backup destination on your NAS (already mounted by your script/fstab)
      - /mnt/nas-backup/raspberry-backup/duplicati:/backups
