version: "3.8"

services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    environment:
      - PUID=1000           # adjust if your Docker user is different
      - PGID=1000
      - TZ=Europe/Vienna
    ports:
      - "8200:8200"         # Web UI
    volumes:
      # Duplicati config (its own DB, settings, jobs)
      - /opt/duplicati/config:/config

      # Things to back up (examples – ADJUST to your real paths):

      # Portainer /data (so stacks/env/endpoint config survive)
      - /opt/portainer:/source/portainer      # <<< adjust if yours is elsewhere

      # InfluxDB data (example volume path)
      - /var/lib/docker/volumes/influxdb2_data/_data:/source/influxdb2  # <<< check your volume path

      # Grafana data (example)
      - /var/lib/docker/volumes/grafana_data/_data:/source/grafana      # <<< check your volume path

      # Backup destination on your host (e.g. NAS share mounted here)
      - /mnt/backup/duplicati:/backups        # <<< mount your NAS here on the host
