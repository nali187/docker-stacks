services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    environment:
      - PUID=1000           # UID of user 'nali' (check with: id nali)
      - PGID=1000           # GID of user 'nali'
      - TZ=Europe/Vienna
      - SETTINGS_ENCRYPTION_KEY=${KEY}
      - CLI_ARGS=--webservice-interface=0.0.0.0 --webservice-port=8200 --webservice-password=${PASS}
    ports:
      - "8200:8200"         # Web UI
    volumes:
      - /srv/docker/duplicati/config:/config
      - /srv/docker:/source
      - /mnt/nas-backup/raspberry-backup/duplicati:/backups
      # Give Duplicati access to host Docker
      - /usr/bin/docker:/usr/bin/docker
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "989"