version: "3.8"

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=***REMOVED_CLOUDFLARE_TUNNEL_TOKEN***
    networks:
      - cloudflared-net

networks:
  monitoring:
  cloudflared-net:
    external: true