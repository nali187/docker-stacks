name: influxdb3
services:
  influxdb3-core:
    image: influxdb:3-core
    container_name: influxdb3-core
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
      # optionally pin HTTP bind (defaults to 0.0.0.0:8181)
      # - --http-bind=0.0.0.0:8181
    ports:
      - "8181:8181"
    user: 1000:1000
    volumes:
      - /srv/docker/influxdb3/core/data:/var/lib/influxdb3/data
      - /srv/docker/influxdb3/core/plugins:/var/lib/influxdb3/plugins
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - homelab

networks:
  homelab:
    external: true
