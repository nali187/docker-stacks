[[inputs.modbus]]
  name = "Fronius Gen24"
  timeout = "1s"
  busy_retries = 2
  busy_retries_wait = "100ms"
  controller = "tcp://192.168.50.252:502"
  configuration_type= "request"
  tagexclude = ["slave_id", "type", "name", "host"]


