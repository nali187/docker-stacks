[[outputs.influxdb_v2]]
  ## The URLs of the InfluxDB cluster nodes.
  ##
  ## Multiple URLs can be specified for a single cluster, only ONE of the
  ## urls will be written to each interval.
  ## urls exp: http://127.0.0.1:9999
  urls = ["http://192.168.50.164:8086"]

  ## Token for authentication.
  ## token = "***REMOVED_INFLUXDB_TOKEN***"
  token = "${INFLUXDB_TOKEN}"
  ## Organization is the name of the organization you wish to write to; must exist.
  organization = "Neubauer"

  ## Destination bucket to write into.
  bucket_tag = "bucket"

#################################################### TA CMI/UVR1611 ####################################################
[[inputs.http]]
  urls = ["http://192.168.50.132/INCLUDE/api.cgi?jsonnode=1&jsonparam=I,O"]
  ## username = "admin"
  ## password = "admin"
  username = "${CMI_USERNAME}"
  password = "${CMI_PASSWORD}"
  interval = "30s"
  timeout = "10s"
  data_format = "json_v2"
  tagexclude = ["url", "host"]

[inputs.http.tags]
	Origin = "UVR1611"
	bucket = "TA"

